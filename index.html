<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatGPT Clone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:100%;
    max-width:900px;
    height:95vh;
    background:#171717;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.header{
    padding:20px;
    background:#202123;
    color:white;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

#chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:80%;
    padding:14px 18px;
    border-radius:16px;
    line-height:1.5;
    font-size:16px;
    word-wrap:break-word;
}

.user{
    background:#19c37d;
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

.bot{
    background:#2a2b32;
    color:white;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

.input-area{
    display:flex;
    padding:20px;
    background:#202123;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#2a2b32;
    color:white;
    font-size:16px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#19c37d;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#13a76a;
}

.typing{
    opacity:0.7;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.3;
    }
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#555;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        AI ChatBot
    </div>

    <div id="chat-box">

        <div class="message bot">
            Hello 👋<br>
            Ask me anything.
        </div>

    </div>

    <div class="input-area">
        <input 
            type="text" 
            id="user-input" 
            placeholder="Message AI..."
        >
        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

const chatBox = document.getElementById("chat-box");
const input = document.getElementById("user-input");

input.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

function addMessage(text, sender){

    const msg = document.createElement("div");

    msg.classList.add("message");
    msg.classList.add(sender);

    msg.innerHTML = text;

    chatBox.appendChild(msg);

    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

    const userText = input.value.trim();

    if(userText === ""){
        return;
    }

    addMessage(userText, "user");

    input.value = "";

    const typingDiv = document.createElement("div");

    typingDiv.classList.add("message");
    typingDiv.classList.add("bot");
    typingDiv.classList.add("typing");

    typingDiv.innerHTML = "Typing...";

    chatBox.appendChild(typingDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        const response = await fetch(
            "https://api.openai.com/v1/chat/completions",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",

                    "Authorization":"Bearer YOUR_OPENAI_API_KEY"
                },

                body:JSON.stringify({

                    model:"gpt-4o-mini",

                    messages:[
                        {
                            role:"system",
                            content:"You are a helpful AI assistant like ChatGPT."
                        },

                        {
                            role:"user",
                            content:userText
                        }
                    ]

                })

            }
        );

        const data = await response.json();

        typingDiv.remove();

        addMessage(
            data.choices[0].message.content,
            "bot"
        );

    }

    catch(error){

        typingDiv.remove();

        addMessage(
            "Error connecting to AI API",
            "bot"
        );

    }

}

</script>

</body>
</html>
