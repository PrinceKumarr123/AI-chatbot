<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:400px;
    height:600px;
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.header{
    background:#334155;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

#chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    color:white;
}

.message{
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    max-width:80%;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.bot{
    background:#475569;
}

.input-area{
    display:flex;
    padding:10px;
    background:#334155;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">AI Chatbot</div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
const chatBox = document.getElementById("chat-box");

function addMessage(text, sender){
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("user-input");
    const userText = input.value;

    if(userText.trim() === "") return;

    addMessage(userText, "user");

    input.value = "";

    addMessage("Typing...", "bot");

    try{

        const response = await fetch("https://api.openai.com/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer YOUR_OPENAI_API_KEY"
            },
            body:JSON.stringify({
                model:"gpt-4o-mini",
                messages:[
                    {
                        role:"user",
                        content:userText
                    }
                ]
            })
        });

        const data = await response.json();

        document.querySelector(".bot:last-child").remove();

        addMessage(data.choices[0].message.content, "bot");

    }catch(error){

        document.querySelector(".bot:last-child").remove();

        addMessage("Error connecting to AI", "bot");
    }
}
</script>


</body>
</html>
